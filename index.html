    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "A CLARA substitui análise jurídica?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. A CLARA foi pensada para apoiar o uso do SEI-Rio e a execução de rotinas administrativas. Quando a situação exigir interpretação normativa, decisão formal ou parecer especializado, a validação deve seguir os canais competentes."
          }
        },
        {
          "@type": "Question",
          "name": "Posso usar para processos em andamento no SEI-Rio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. A CLARA pode ajudar a revisar etapas, organizar documentos, entender encaminhamentos, conferir blocos e preparar a próxima ação antes de operar no processo."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o modo Direto e o Didático?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No modo Direto, a resposta vem curta e objetiva para consulta rápida. No modo Didático, a explicação é organizada em etapas para quem precisa executar o procedimento com mais segurança."
          }
        },
        {
          "@type": "Question",
          "name": "As respostas trazem base documental?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Quando a base local encontra respaldo para a pergunta, a resposta pode indicar os documentos consultados. Ainda assim, a validação final deve considerar os materiais oficiais usados pela sua unidade."
          }
        },
        {
          "@type": "Question",
          "name": "A CLARA funciona em celular e desktop?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O layout foi ajustado para ambos. No desktop, o chat abre em painel lateral; no mobile, funciona como sheet com foco na leitura e no envio da pergunta."
          }
        }
      ]
    }
